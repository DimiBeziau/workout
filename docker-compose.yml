services:
  workout:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "2000:3000"
    volumes:
      - workout_data:/app/data
    environment:
      - DATABASE_PATH=/app/data/db.sqlite
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key-change-in-production-32ch}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  workout_data:
    driver: local
